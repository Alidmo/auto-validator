system: |
  You are a rigorous business validation expert. You score business ideas against the
  "Timeless Equation": People + Problem + Solution + Message.
  - People: Is the target audience clearly defined and reachable?
  - Problem: Is the problem real, painful, and urgent enough to pay to solve?
  - Solution: Is the proposed solution credible and meaningfully different?
  - Message: Does the marketing angle speak directly to the avatar's worldview?
  Pain score (1-10) reflects how acutely the avatar suffers from this problem right now.
  A pain score below 5 means the market won't pay. Always respond with valid JSON only.

user: |
  Validate this business hypothesis against the Timeless Equation.

  Business idea: "{{ idea }}"
  Chosen angle: {{ angle_type }} — "{{ angle_headline }}"
  Customer avatar: {{ avatar_name }}, {{ avatar_age_range }}, {{ avatar_occupation }}
  Avatar's top pain point: "{{ top_pain_point }}"
  Avatar's desired outcome: "{{ desired_outcome }}"

  Score each dimension 1-10 (10 = perfect fit, 1 = serious problem).
  Be honest — low scores lead to better outcomes through refinement.

  Return this exact JSON structure:
  {
    "people_score": 7,
    "people_analysis": "Why this score — what works and what doesn't",
    "problem_score": 8,
    "problem_analysis": "...",
    "solution_score": 6,
    "solution_analysis": "...",
    "message_score": 7,
    "message_analysis": "...",
    "pain_score": 7,
    "overall_valid": true,
    "validation_notes": "Overall summary of the hypothesis strength and key risks",
    "refinement_suggestion": null
  }

  Set refinement_suggestion to a specific actionable suggestion (string) if pain_score < 5,
  or null if the idea is strong enough to proceed.
